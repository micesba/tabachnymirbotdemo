<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Демо админ-панель — Табачный мир</title><link rel="stylesheet" href="assets/style.css"><style>.admin{max-width:1000px;margin:0 auto;padding:18px}.table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:18px;overflow:hidden}.table th,.table td{border-bottom:1px solid var(--line);padding:12px;text-align:left}.form{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;background:var(--panel);border:1px solid var(--line);padding:14px;border-radius:18px;margin-bottom:14px}@media(max-width:760px){.form{grid-template-columns:1fr}.table{font-size:13px}}</style></head><body><main class="admin"><p class="eyebrow">Демо</p><h1>Админ-панель каталога</h1><p class="small">Это демонстрация: в полной версии данные будут храниться на сервере. Здесь можно показать владельцу механику добавления товара.</p><form class="form" id="productForm"><input name="title" placeholder="Название" required><input name="category" placeholder="Категория" required><input name="price" placeholder="Цена / по запросу" required><input name="desc" placeholder="Описание"><button class="btn primary" type="submit">Добавить товар</button></form><table class="table"><thead><tr><th>Название</th><th>Категория</th><th>Цена</th><th>Описание</th><th></th></tr></thead><tbody id="rows"></tbody></table></main><script>
const defaultItems=[['Сигареты оптом','Сигареты','Прайс по запросу','Популярные позиции для магазинов'],['Табак для кальяна','Табак для кальяна','Уточнить','Линейка вкусов и фасовок'],['Собственный табак','Собственный табак','Уточнить','Раздел для партнёров']];
let items=JSON.parse(localStorage.getItem('tm_admin_products')||'null')||defaultItems.map((x,i)=>({id:i+1,title:x[0],category:x[1],price:x[2],desc:x[3]}));
function save(){localStorage.setItem('tm_admin_products',JSON.stringify(items));render()}function render(){rows.innerHTML=items.map(x=>`<tr><td>${x.title}</td><td>${x.category}</td><td>${x.price}</td><td>${x.desc||''}</td><td><button class="btn" onclick="del(${x.id})">Удалить</button></td></tr>`).join('')}function del(id){items=items.filter(x=>x.id!==id);save()}productForm.onsubmit=e=>{e.preventDefault();const f=Object.fromEntries(new FormData(e.target).entries());items.push({id:Date.now(),...f});e.target.reset();save()};render();
</script></body></html>
